name: peoplefirst_mobile
description: PeopleFirst mobile application
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.4.4
  firebase_messaging: ^15.1.3
  connectivity_plus: ^6.0.5
  geolocator: ^13.0.2
  shared_preferences: ^2.2.2
  audioplayers: ^6.0.0
  torch_light: ^1.1.0
  lucide_icons: ^0.257.0
  google_fonts: ^6.1.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/siren.wav